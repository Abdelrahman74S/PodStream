services:
  mongodb:
    image: mongo:latest
    container_name: podstream_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    
  chroma:
    image: chromadb/chroma:latest
    container_name: chroma_db
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  minio:
    image: minio/minio:latest
    container_name: podstream_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set myminio http://minio:9000 ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY}; do echo 'Waiting for MinIO...'; sleep 1; done;
      /usr/bin/mc mb myminio/${AWS_STORAGE_BUCKET_NAME} || true;
      /usr/bin/mc anonymous set public myminio/${AWS_STORAGE_BUCKET_NAME} || true;
      exit 0;
      "

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: podstream_web
    command: python src/manage.py runserver 0.0.0.0:8000
    dns:
      - 8.8.8.8
    volumes:
      - .:/src
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DOCKER_ENV=True
      - CHROMA_HOST=chroma
    depends_on:
      - mongodb
      - minio
      - redis

  celery:
    build: .
    command: celery -A config worker -B --loglevel=info
    volumes:
      - .:/src
    environment:
      - PYTHONPATH=src
      - MONGO_URI=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DOCKER_ENV=True
      - CHROMA_HOST=chroma
    depends_on:
      - redis
      - web

volumes:
  mongodb_data:
  minio_data:
  chroma_data:
